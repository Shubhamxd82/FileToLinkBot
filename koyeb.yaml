name: filetolink-bot
type: web
definition:
  name: filetolink-bot
  type: web
  instance_types:
    - type: free
  regions:
    - was
  scaling:
    min: 1
    max: 1
  ports:
    - port: 8080
      protocol: http
  health_checks:
    - path: /health
      port: 8080
      protocol: http
  docker:
    dockerfile: Dockerfile
